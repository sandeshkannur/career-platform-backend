name: Backend CI/CD Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=295447237305.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          IMAGE_URI_LATEST=295447237305.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI -t $IMAGE_URI_LATEST .

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          echo "IMAGE_URI_LATEST=$IMAGE_URI_LATEST" >> $GITHUB_ENV

      - name: Push Docker image to ECR
        run: |
          echo "Pushing image: $IMAGE_URI"
          docker push $IMAGE_URI
          docker push $IMAGE_URI_LATEST

      - name: Deploy to EC2 via SSM
        run: |
          echo "Deploying image: $IMAGE_URI"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy new backend version" \
            --parameters 'commands=[
              "set -e",
              "echo ===== Logging into ECR =====",
              "aws ecr get-login-password --region '"${{ secrets.AWS_REGION }}"' | docker login --username AWS --password-stdin 295447237305.dkr.ecr.'"${{ secrets.AWS_REGION }}"'.amazonaws.com",

              "echo ===== Pulling latest image =====",
              "docker pull '"$IMAGE_URI"'",

              "echo ===== Stopping old container =====",
              "docker stop career-backend || true",

              "echo ===== Removing old container =====",
              "docker rm career-backend || true",

              "echo ===== Cleaning unused Docker images =====",
              "docker image prune -af || true",

              "echo ===== Starting new container =====",
              "docker run -d --name career-backend --restart unless-stopped -p 8000:8000 --env-file /home/ec2-user/career-backend.env '"$IMAGE_URI"'",

              "echo ===== Waiting for container startup =====",
              "sleep 60",

              "echo ===== Health check =====",
              "curl --retry 5 --retry-delay 10 -f http://localhost:8000/health"
            ]' \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed --cli-read-timeout 300 \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query 'Status' \
            --output text)

          echo "Deployment status: $STATUS"
          test "$STATUS" = "Success"