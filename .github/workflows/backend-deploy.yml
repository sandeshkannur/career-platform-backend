name: Backend CI/CD Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials via OIDC (NO static keys)
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3️⃣ Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Build Docker image tagged directly with ECR URI
      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=295447237305.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG
          
          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI .
          
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # 5️⃣ Push image to ECR
      - name: Push Docker image to ECR
        run: |
          echo "Pushing image: $IMAGE_URI"
          docker push $IMAGE_URI

      # 6️⃣ Deploy to EC2 via SSM
      - name: Deploy to EC2 via SSM
        run: |
          echo "Deploying image: $IMAGE_URI"

          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy new backend version" \
            --parameters commands="\
              docker pull $IMAGE_URI && \
              docker stop career-backend || true && \
              docker rm career-backend || true && \
              docker run -d --name career-backend \
                --restart unless-stopped \
                -p 8000:8000 \
                --env-file ~/career-backend.env \
                $IMAGE_URI \
            "
