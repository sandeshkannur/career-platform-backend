name: FastAPI CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ./backend

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: counseling
          POSTGRES_PASSWORD: password
          POSTGRES_DB: counseling_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Create fallback .env
        run: |
          echo "DATABASE_URL=sqlite:///./dev.db" > backend/.env
          echo "SKIP_DB_WAIT=1" >> backend/.env

      - name: Run Tests with Debug Info
        run: |
          echo "PYTHONPATH: $PYTHONPATH"
          pytest backend/tests
