services:
  db:
    image: postgres:15
    container_name: backend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: counseling
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: counseling_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U counseling -d counseling_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-app
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:delegated
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
